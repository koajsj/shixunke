<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1220" viewBox="0 0 1600 1220" role="img" aria-labelledby="title desc">
  <title id="title">汽车租赁系统 ER 图</title>
  <desc id="desc">根据 car.sql 绘制，展示 Customer、Car、Rental、Payment 四张表及其主外键关系。</desc>
  <defs>
    <style>
      .font { font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif; }
      .mono { font-family: "Consolas", "Cascadia Mono", "Microsoft YaHei", monospace; }
      .title { fill: #111111; font-size: 34px; font-weight: 700; }
      .subtitle { fill: #666666; font-size: 15px; }
      .card { fill: #ffffff; stroke: #111111; stroke-width: 1.6; rx: 16; ry: 16; }
      .head { fill: #111111; }
      .entity { fill: #ffffff; font-size: 23px; font-weight: 700; }
      .field { fill: #111111; font-size: 15px; }
      .pk { font-weight: 700; }
      .fk { fill: #444444; font-weight: 700; }
      .line { stroke: #111111; stroke-width: 2.8; fill: none; }
      .label { fill: #111111; font-size: 16px; font-weight: 700; }
      .note { fill: #555555; font-size: 14px; }
      .rule { stroke: #111111; stroke-width: 1; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1220" fill="#ffffff"/>

  <text class="font title" x="800" y="56" text-anchor="middle">汽车租赁系统 ER 图</text>
  <text class="font subtitle" x="800" y="84" text-anchor="middle">根据 car.sql 生成，保持精简但完整</text>

  <g transform="translate(120,150)">
    <rect class="card" x="0" y="0" width="360" height="248" rx="16" ry="16"/>
    <rect class="head" x="0" y="0" width="360" height="54" rx="16" ry="16"/>
    <rect class="head" x="0" y="36" width="360" height="18"/>
    <text class="font entity" x="24" y="37">Customer</text>
    <line class="rule" x1="18" y1="88" x2="342" y2="88"/>
    <text class="mono field pk" x="24" y="128">PK  CustomerID</text>
    <text class="mono field" x="24" y="160">Name</text>
    <text class="mono field" x="24" y="192">Phone</text>
    <text class="mono field" x="24" y="224">Email</text>
    <text class="mono field" x="24" y="244">LicenseNumber</text>
  </g>

  <g transform="translate(1120,150)">
    <rect class="card" x="0" y="0" width="360" height="276" rx="16" ry="16"/>
    <rect class="head" x="0" y="0" width="360" height="54" rx="16" ry="16"/>
    <rect class="head" x="0" y="36" width="360" height="18"/>
    <text class="font entity" x="24" y="37">Car</text>
    <line class="rule" x1="18" y1="88" x2="342" y2="88"/>
    <text class="mono field pk" x="24" y="128">PK  CarID</text>
    <text class="mono field" x="24" y="160">PlateNumber</text>
    <text class="mono field" x="24" y="192">Brand</text>
    <text class="mono field" x="24" y="224">Model</text>
    <text class="mono field" x="24" y="256">Color</text>
    <text class="mono field" x="190" y="160">Year</text>
    <text class="mono field" x="190" y="192">Status</text>
    <text class="mono field" x="190" y="224">DailyRate</text>
  </g>

  <g transform="translate(470,470)">
    <rect class="card" x="0" y="0" width="660" height="268" rx="16" ry="16"/>
    <rect class="head" x="0" y="0" width="660" height="54" rx="16" ry="16"/>
    <rect class="head" x="0" y="36" width="660" height="18"/>
    <text class="font entity" x="24" y="37">Rental</text>
    <line class="rule" x1="18" y1="88" x2="642" y2="88"/>
    <text class="mono field pk" x="24" y="128">PK  RentalID</text>
    <text class="mono field fk" x="24" y="160">FK  CustomerID</text>
    <text class="mono field fk" x="24" y="192">FK  CarID</text>
    <text class="mono field" x="24" y="224">RentalDate</text>
    <text class="mono field" x="320" y="128">ReturnDate</text>
    <text class="mono field" x="320" y="160">ActualReturnDate</text>
    <text class="mono field" x="320" y="192">TotalAmount</text>
    <text class="mono field" x="320" y="224">Status</text>
  </g>

  <g transform="translate(610,840)">
    <rect class="card" x="0" y="0" width="380" height="188" rx="16" ry="16"/>
    <rect class="head" x="0" y="0" width="380" height="54" rx="16" ry="16"/>
    <rect class="head" x="0" y="36" width="380" height="18"/>
    <text class="font entity" x="24" y="37">Payment</text>
    <line class="rule" x1="18" y1="88" x2="362" y2="88"/>
    <text class="mono field pk" x="24" y="128">PK  PaymentID</text>
    <text class="mono field fk" x="24" y="160">FK  RentalID</text>
    <text class="mono field" x="190" y="128">PaymentDate</text>
    <text class="mono field" x="190" y="160">Amount</text>
    <text class="mono field" x="190" y="192">PaymentMethod</text>
  </g>

  <path class="line" d="M480 245 C590 245, 650 500, 650 525"/>
  <text class="font label" x="498" y="231">1</text>
  <text class="font label" x="638" y="512">N</text>

  <path class="line" d="M1120 255 C1020 255, 980 500, 950 525"/>
  <text class="font label" x="1094" y="241">1</text>
  <text class="font label" x="958" y="512">N</text>

  <path class="line" d="M800 738 L800 840"/>
  <text class="font label" x="814" y="778">1</text>
  <text class="font label" x="814" y="832">N</text>

  <g transform="translate(90,1090)">
    <text class="font note" x="0" y="0">关系说明：Customer 1:N Rental，表示一个客户可以产生多条租赁记录。</text>
    <text class="font note" x="0" y="26">Car 1:N Rental，表示一辆汽车可以在不同时间对应多条租赁记录。</text>
    <text class="font note" x="0" y="52">Rental 1:N Payment，表示一条租赁记录可以对应一条或多条支付记录。</text>
    <text class="font note" x="0" y="78">实体说明：Customer 保存客户信息，Car 保存车辆信息，Rental 记录租赁过程，Payment 记录支付情况。</text>
  </g>
</svg>
